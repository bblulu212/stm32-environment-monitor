name: Build STM32 HEX

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Download GCC startup file for STM32F103
        run: |
          curl -L -o Start/startup_stm32f103xb.s https://raw.githubusercontent.com/STMicroelectronics/cmsis_device_f1/master/Source/Templates/gcc/startup_stm32f103xb.s

      - name: Build firmware
        run: make

      - name: Upload HEX artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hex
          path: firmware.hex
